<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- SEO basic -->
    <title>CardioCore</title>
    <meta
      name="description"
      content="CardioCore - clinică de cardiologie în București. Consult cardiologic, EKG, ecocardiografie Doppler, test de efort, Holter ECG și monitorizare tensională. Programări rapide și grijă autentică pentru inima ta."
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://cardiocore.ro/" />
    <meta name="theme-color" content="#C23B22" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon (pune CardioCoreLogo.png în /public) -->
    <link rel="icon" type="image/png" href="/CardioCoreLogo.png" />

    <!-- Open Graph / Sharing -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="CardioCore - Clinică de cardiologie în București"
    />
    <meta
      property="og:description"
      content="Consult cardiologic, EKG, ecocardiografie, test de efort, Holter ECG și monitorizare TA. Programări rapide, grijă autentică pentru pacienți."
    />
    <meta property="og:image" content="/og-card.png" />
    <meta property="og:url" content="https://cardiocore.ro/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="CardioCore - Clinică de cardiologie în București"
    />
    <meta
      name="twitter:description"
      content="Cardiologie modernă cu suflet: expertiză medicală, tehnologie de vârf și grijă autentică."
    />
    <meta name="twitter:image" content="/og-card.png" />

    <!-- (Opțional) pentru Vite + router pe subdirectoare -->
    <!-- <base href="/" /> -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
